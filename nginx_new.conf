server {
    listen 80;
    server_name newbie.rimeleaf.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name newbie.rimeleaf.com;

    ssl_certificate /etc/letsencrypt/live/newbie.rimeleaf.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newbie.rimeleaf.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 前端静态文件
    root /home/frostleaf/CascadeProjects/newbie/dist;
    index index.html;

    # 代理用户认证和画廊 API（到 Node.js 后端 8001）
    location ~ ^/api/(auth|gallery|history|styles) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    # 代理 NovelAI API
    location /api/novelai {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }

    # 代理 Vibe Transfer API (支持大图上传)
    location /api/vibe {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        client_max_body_size 50M;
    }

    # 代理 AI 助手 API（保持原有功能）
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 代理 ComfyUI API (必须在 / 之前)
    location /comfyui {
        rewrite ^/comfyui/(.*) /$1 break;
        rewrite ^/comfyui$ / break;
        proxy_pass http://e608ebf6659745cba177ca2aef23e50b.cloud.lanyun.net:18188;
        proxy_set_header Host e608ebf6659745cba177ca2aef23e50b.cloud.lanyun.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 代理 Standard ComfyUI API
    location /comfyui-standard {
        rewrite ^/comfyui-standard/(.*) /$1 break;
        rewrite ^/comfyui-standard$ / break;
        proxy_pass http://eb36d82cf7e2469bae5bbdd93a72a2b0.cloud.lanyun.net:18189;
        proxy_set_header Host eb36d82cf7e2469bae5bbdd93a72a2b0.cloud.lanyun.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;

        # Allow large image uploads for upscaling
        client_max_body_size 50M;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
